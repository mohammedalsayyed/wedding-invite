<!DOCTYPE html>
<html lang="ar" dir="rtl"  style="
    height: 100%;
">
<head>
<meta charset="UTF-8">
<title>دعوة زفاف</title>

<link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Cairo', sans-serif;
    background: url('https://images.unsplash.com/photo-1522673607200-164d1b6ce486') no-repeat center center/cover;
    color: white;
}

/* طبقة تغميق */
.overlay-bg {
    background: rgba(0,0,0,0.6);
    position: fixed;
    width: 100%;
    height: 100%;
    top: 0;
}

/* المحتوى */
.container {
    position: relative;
    z-index: 2;
    text-align: center;
    padding: 80px 20px;
}

/* كرت زجاجي */
.card {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    padding: 40px;
    border-radius: 20px;
    display: inline-block;
    max-width: 500px;
    width: 90%;
    box-shadow: 0 0 30px rgba(0,0,0,0.5);
}

/* العنوان */
h1 {
    font-size: 38px;
    margin-bottom: 10px;
}

/* الأسماء */
.names {
    font-size: 30px;
    color: #ffd700;
    margin: 15px 0;
}

/* العداد */
.countdown {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-top: 25px;
    flex-wrap: wrap;
}

.box {
    background: rgba(255,255,255,0.2);
    padding: 10px;
    border-radius: 10px;
    width: 70px;
}

.box span {
    font-size: 22px;
    font-weight: bold;
}

/* المكان */
.location {
    margin-top: 20px;
    font-size: 16px;
}

/* Overlay */
#startScreen {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 28px;
    z-index: 9999;
    cursor: pointer;
}

/* قلوب */
.heart {
    position: fixed;
    bottom: -10px;
    color: #ff4d6d;
    animation: float 5s linear infinite;
}

@keyframes float {
    0% {transform: translateY(0); opacity:1;}
    100% {transform: translateY(-800px); opacity:0;}
}
</style>
</head>

<body style="
    zoom: 1;
    align-items: center;
    display: flex;
    justify-content: center;
    height: 100%;
">

<div id="startScreen" onclick="startSite()">
    💍 اضغط للدخول 💍
</div>

<div class="overlay-bg"></div>

<div class="container">
    <div class="card" data-aos="zoom-in">

        <h1>💍 دعوة زفاف 💍</h1>

        <div class="names">
            محمد & سوار
        </div>

        <p>بكل حب ندعوكم لمشاركتنا أجمل لحظات حياتنا</p>

        <div class="countdown" id="countdown">
            <div class="box"><span id="days">0</span>يوم</div>
            <div class="box"><span id="hours">0</span>ساعة</div>
            <div class="box"><span id="minutes">0</span>دقيقة</div>
            <div class="box"><span id="seconds">0</span>ثانية</div>
        </div>

        <div class="location">
            📍 قاعة البادية - النصيرات<br>
            🗓️ 2026/04/26
        </div>

    </div>
</div>

<audio id="music" loop>
    <source src="wedding.mp3" type="audio/mpeg">
</audio>

<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

<script>
AOS.init();

// تشغيل الموقع
function startSite(){
    document.getElementById("startScreen").style.display = "none";
    document.getElementById("music").play();
    startHearts();
}

// عداد
const weddingDate = new Date("April 26, 2026 20:00:00").getTime();

setInterval(()=>{
    const now = new Date().getTime();
    const d = weddingDate - now;

    if(d < 0){
        document.getElementById("countdown").innerHTML = "🎉 تم الزواج 🎉";
        return;
    }

    days.innerText = Math.floor(d / (1000*60*60*24));
    hours.innerText = Math.floor((d/(1000*60*60))%24);
    minutes.innerText = Math.floor((d/(1000*60))%60);
    seconds.innerText = Math.floor((d/1000)%60);

},1000);

// قلوب
function startHearts(){
    setInterval(()=>{
        let h = document.createElement("div");
        h.className="heart";
        h.innerHTML="❤️";
        h.style.left=Math.random()*100+"vw";
        h.style.fontSize=(10+Math.random()*20)+"px";
        document.body.appendChild(h);
        setTimeout(()=>h.remove(),5000);
    },300);
}
</script>

</body>
</html>
