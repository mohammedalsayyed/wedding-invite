<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>دعوة زفاف</title>

    <!-- AOS -->
    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(to bottom, #0f2027, #203a43, #2c5364);
            color: white;
            text-align: center;
            overflow-x: hidden;
        }

        .container {
            padding: 50px 20px;
        }

        h1 {
            font-size: 40px;
        }

        .names {
            font-size: 28px;
            color: #ffd700;
        }

        .countdown {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .box {
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 10px;
            width: 80px;
        }

        .box span {
            display: block;
            font-size: 24px;
            font-weight: bold;
        }

        .location {
            margin-top: 30px;
            font-size: 18px;
        }

        /* Overlay */
        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 30px;
            z-index: 9999;
            cursor: pointer;
            text-align: center;
        }

        /* قلوب */
        .heart {
            position: fixed;
            bottom: -10px;
            color: red;
            font-size: 20px;
            animation: floatUp 5s linear infinite;
        }

        @keyframes floatUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-800px); opacity: 0; }
        }

    </style>
</head>

<body style="
    zoom: 2;
">

<!-- Overlay -->
<div id="overlay" onclick="startExperience()">
    💍 اضغط للدخول 💍
</div>

<div class="container">

    <h1 data-aos="fade-down">💍 دعوة زفاف 💍</h1>

    <p class="names" data-aos="fade-up">
        محمد & سوار
    </p>

    <p data-aos="fade-up">
        بكل حب ندعوكم لحضور حفل زفافنا
    </p>

    <!-- Countdown -->
    <div class="countdown" id="countdown">
        <div class="box"><span id="days">0</span>يوم</div>
        <div class="box"><span id="hours">0</span>ساعة</div>
        <div class="box"><span id="minutes">0</span>دقيقة</div>
        <div class="box"><span id="seconds">0</span>ثانية</div>
    </div>

    <div class="location" data-aos="fade-up">
        📍 المكان: قاعة البادية - النصيرات<br>
        🗓️ التاريخ: 2026/04/26
    </div>

    <!-- Audio -->
    <audio id="weddingMusic" loop>
        <source src="wedding.mp3" type="audio/mpeg">
    </audio>

</div>

<!-- AOS -->
<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

<script>
    AOS.init();

    // 🎵 تشغيل التجربة
    function startExperience() {
        const music = document.getElementById("weddingMusic");
        music.play();

        document.getElementById("overlay").style.display = "none";

        startHearts();
    }

    // ⏳ عداد
    const weddingDate = new Date("April 26, 2026 20:00:00").getTime();

    const countdown = setInterval(() => {
        const now = new Date().getTime();
        const distance = weddingDate - now;

        if (distance < 0) {
            clearInterval(countdown);
            document.getElementById("countdown").innerHTML = "🎉 تم الزواج بحمد الله 🎉";
            return;
        }

        document.getElementById("days").innerText = Math.floor(distance / (1000 * 60 * 60 * 24));
        document.getElementById("hours").innerText = Math.floor((distance / (1000 * 60 * 60)) % 24);
        document.getElementById("minutes").innerText = Math.floor((distance / (1000 * 60)) % 60);
        document.getElementById("seconds").innerText = Math.floor((distance / 1000) % 60);

    }, 1000);

    // ❤️ قلوب
    function startHearts() {
        setInterval(() => {
            const heart = document.createElement("div");
            heart.className = "heart";
            heart.innerText = "❤️";

            heart.style.left = Math.random() * 100 + "vw";
            heart.style.fontSize = (Math.random() * 20 + 10) + "px";

            document.body.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 5000);

        }, 300);
    }

</script>

</body>
</html>
